apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicepro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicepro
  template:
    metadata:
      labels:
        app: servicepro
    spec:
      containers:
      - name: servicepro
        image: naveen0810/servicepro:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: servicepro-service
spec:
  type: NodePort
  selector:
    app: servicepro
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30007