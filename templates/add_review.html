{% extends "base.html" %}

{% block title %}Add Review - ServicePro{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">
                        <i class="fas fa-star me-2"></i>Add Review
                    </h4>
                </div>
                <div class="card-body">
                    <!-- Booking Details -->
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <h6 class="text-muted">Service Details</h6>
                            <p class="mb-1"><strong>{{ booking.service.category }}</strong></p>
                            <p class="text-muted mb-0">{{ booking.service.description }}</p>
                        </div>
                        <div class="col-md-6">
                            <h6 class="text-muted">Provider</h6>
                            <p class="mb-1"><strong>{{ booking.provider.user.name }}</strong></p>
                            <p class="text-muted mb-0">{{ booking.provider.user.phone }}</p>
                        </div>
                    </div>
                    
                    <hr>
                    
                    <!-- Review Form -->
                    <form method="POST">
                        <div class="mb-4">
                            <label for="rating" class="form-label">Rating</label>
                            <div class="rating-input">
                                <div class="btn-group" role="group">
                                    <input type="radio" class="btn-check" name="rating" id="rating1" value="1" required>
                                    <label class="btn btn-outline-warning" for="rating1">
                                        <i class="fas fa-star"></i> 1
                                    </label>
                                    
                                    <input type="radio" class="btn-check" name="rating" id="rating2" value="2">
                                    <label class="btn btn-outline-warning" for="rating2">
                                        <i class="fas fa-star"></i> 2
                                    </label>
                                    
                                    <input type="radio" class="btn-check" name="rating" id="rating3" value="3">
                                    <label class="btn btn-outline-warning" for="rating3">
                                        <i class="fas fa-star"></i> 3
                                    </label>
                                    
                                    <input type="radio" class="btn-check" name="rating" id="rating4" value="4">
                                    <label class="btn btn-outline-warning" for="rating4">
                                        <i class="fas fa-star"></i> 4
                                    </label>
                                    
                                    <input type="radio" class="btn-check" name="rating" id="rating5" value="5">
                                    <label class="btn btn-outline-warning" for="rating5">
                                        <i class="fas fa-star"></i> 5
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="comments" class="form-label">Comments</label>
                            <textarea class="form-control" id="comments" name="comments" rows="4" 
                                      placeholder="Share your experience with this service provider..." required></textarea>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-paper-plane me-2"></i>Submit Review
                            </button>
                            <a href="{{ url_for('user_dashboard') }}" class="btn btn-secondary">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.rating-input .btn-check:checked + .btn {
    background-color: #ffc107;
    border-color: #ffc107;
    color: #000;
}
</style>
{% endblock %}
